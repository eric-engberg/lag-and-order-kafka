# Three-broker Kafka cluster (KRaft) on Kubernetes -- the k8s equivalent of
# compose/cluster.yml, for the failure drills (episodes 5-7).
#
#   kubectl apply -f k8s/cluster/kafka.yaml
#   kubectl -n kafka-lab rollout status statefulset/kafka
#   kubectl -n kafka-lab exec -it kafka-0 -- \
#     /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 \
#       --create --topic payments --partitions 3 --replication-factor 3
#
# Kill a broker the k8s way and watch leadership move + ISR shrink:
#   kubectl -n kafka-lab delete pod kafka-1        # StatefulSet revives it with the same identity
#
# Uses the SAME namespace and names as k8s/single, so run only ONE at a time.
# Switch stacks with:  kubectl delete -f k8s/single/kafka.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: kafka-lab
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: kafka-lab
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: kafka-lab
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka-lab
spec:
  serviceName: kafka-headless
  replicas: 3
  # Parallel so all three come up together and form the controller quorum,
  # instead of waiting for kafka-0 to be Ready before kafka-1 starts.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - { containerPort: 9092, name: broker }
            - { containerPort: 9093, name: controller }
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLUSTER_ID
              value: "wm_0PqlnScmygj4piNbOTA"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            # Real replication: internal + new topics default to RF 3, and a
            # partition needs 2 in-sync replicas to accept acks=all writes.
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "2"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "2"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx512M -Xms512M"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              ORDINAL="${HOSTNAME##*-}"
              export KAFKA_NODE_ID="${ORDINAL}"
              DOMAIN="kafka-headless.${POD_NAMESPACE}.svc.cluster.local"
              export KAFKA_CONTROLLER_QUORUM_VOTERS="0@kafka-0.${DOMAIN}:9093,1@kafka-1.${DOMAIN}:9093,2@kafka-2.${DOMAIN}:9093"
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://${HOSTNAME}.${DOMAIN}:9092"
              exec /__cacert_entrypoint.sh /etc/kafka/docker/run
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
